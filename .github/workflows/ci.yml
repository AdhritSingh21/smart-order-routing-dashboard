name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — exec-ML features, serving guard, API, e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai_viz_platform/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: ai_viz_platform
      - name: Tests
        run: python -m pytest -q
        working-directory: ai_viz_platform

  frontend:
    name: Frontend — unit tests + typecheck/build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ai_viz_platform/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: ai_viz_platform/frontend
      - name: Unit tests
        run: npm test
        working-directory: ai_viz_platform/frontend
      - name: Typecheck + build
        run: npm run build
        working-directory: ai_viz_platform/frontend

  analyzer:
    name: Analyzer — ROS 2 node tests via mock rclpy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install numpy requests pytest
      - name: Tests
        run: python -m pytest src/exec_quality_analyzer/test -q
        working-directory: exec_quality_ws
